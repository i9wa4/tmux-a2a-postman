name: update-go-toolchain
run-name: ${{ github.event_name }} on ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      source_attestation:
        description: "Run an extra no-substitute source build after fast checks"
        required: false
        default: false
        type: boolean

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Guard dispatch ref
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_NAME" != "main" ]]; then
            echo "::error::Run this workflow from main. Selected ref: $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ github.token }}
          extra_nix_config: |
            accept-flake-config = true

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', 'flake.lock') }}

      - name: Assess break-glass need
        id: assess
        run: |
          set -euo pipefail

          version_ge() {
            local first="$1"
            local second="$2"
            [[ "$(printf '%s\n%s\n' "$second" "$first" | sort -V | tail -n 1)" == "$first" ]]
          }

          go_mod_version="$(awk '/^go / { print $2; exit }' go.mod)"
          go_minor="$(printf '%s\n' "$go_mod_version" | cut -d. -f1-2)"
          if ! [[ "$go_minor" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Failed to extract Go major.minor from go.mod: $go_mod_version" >&2
            exit 1
          fi

          nix_attr="go_${go_minor//./_}"
          nix_minor="$(
            sed -nE 's/.*pkgs\.go_([0-9]+_[0-9]+).*/\1/p' flake.nix \
              | head -n 1 \
              | tr '_' '.'
          )"
          override_go="$(
            perl -0ne 'print "$1\n" if /pkgs\.go_[0-9]+_[0-9]+\.overrideAttrs \(_old: rec \{\n\s*version = "([0-9]+\.[0-9]+\.[0-9]+)";/' flake.nix
          )"
          test -n "$nix_minor" || { echo "Failed to extract Go version from flake.nix" >&2; exit 1; }
          test -n "$override_go" || { echo "Failed to extract Go override patch version from flake.nix" >&2; exit 1; }
          if [[ "$go_minor" != "$nix_minor" ]]; then
            echo "Go major.minor mismatch: go.mod=$go_minor, flake.nix=$nix_minor" >&2
            exit 1
          fi
          if [[ "$override_go" != "$go_minor".* ]]; then
            echo "Go override mismatch: go.mod=$go_minor, override=$override_go" >&2
            exit 1
          fi

          set +e
          nix develop .#ci --command govulncheck -json -scan=module > govulncheck-module.jsonl
          govuln_status=$?
          set -e
          if [[ "$govuln_status" -ne 0 && "$govuln_status" -ne 3 ]]; then
            echo "govulncheck -json -scan=module failed with status $govuln_status" >&2
            exit "$govuln_status"
          fi

          go_toolchain_findings="$(
            jq -r '
              select(.finding)
              | (
                  [
                    .finding.trace[]?
                    | select(.module == "stdlib" or .module == "toolchain")
                    | .module + "@" + (.version // "")
                  ]
                  | unique
                ) as $modules
              | select($modules | length > 0)
              | [
                  .finding.osv,
                  .finding.fixed_version,
                  ($modules | join(","))
                ]
              | @tsv
            ' govulncheck-module.jsonl | sort -u
          )"
          {
            echo "go_minor=$go_minor"
            echo "nix_attr=$nix_attr"
            echo "current_go_version=$override_go"
            echo "go_toolchain_findings<<FINDINGS"
            printf '%s\n' "$go_toolchain_findings"
            echo "FINDINGS"
          } >> "$GITHUB_OUTPUT"

          if [[ -z "$go_toolchain_findings" ]]; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
            echo "no_pr_reason=No stdlib/toolchain module findings from govulncheck -scan=module." >> "$GITHUB_OUTPUT"
            echo "No stdlib/toolchain module findings; no PR needed."
            exit 0
          fi

          fixed_versions="$(
            printf '%s\n' "$go_toolchain_findings" \
              | awk -F '\t' -v prefix="v$go_minor." '$2 ~ "^" prefix { sub(/^v/, "", $2); print $2 }' \
              | sort -V \
              | uniq
          )"
          if [[ -z "$fixed_versions" ]]; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
            echo "no_pr_reason=Stdlib/toolchain findings exist, but none advertise a fixed Go patch for $go_minor." >> "$GITHUB_OUTPUT"
            echo "No matching fixed Go patch for $go_minor; no PR created."
            exit 0
          fi

          target_go_version="$(printf '%s\n' "$fixed_versions" | tail -n 1)"
          echo "target_go_version=$target_go_version" >> "$GITHUB_OUTPUT"

          latest_upstream_go_version="$(
            curl -fsSL 'https://go.dev/dl/?mode=json&include=all' \
              | jq -r --arg prefix "go$go_minor." '.[].version | select(startswith($prefix))' \
              | grep -E "^go${go_minor//./\\.}\\.[0-9]+$" \
              | sed 's/^go//' \
              | sort -V \
              | tail -n 1 \
              || true
          )"
          if [[ -z "$latest_upstream_go_version" ]]; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
            echo "no_pr_reason=Go upstream does not currently publish a stable $go_minor patch." >> "$GITHUB_OUTPUT"
            echo "No upstream stable Go $go_minor patch found; no PR created."
            exit 0
          fi
          if ! version_ge "$latest_upstream_go_version" "$target_go_version"; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
            echo "no_pr_reason=Latest upstream Go ${latest_upstream_go_version} does not satisfy fixed version ${target_go_version}." >> "$GITHUB_OUTPUT"
            echo "Upstream Go does not satisfy the fixed version; no PR created."
            exit 0
          fi
          echo "upstream_go_release=go$latest_upstream_go_version" >> "$GITHUB_OUTPUT"

          live_nixpkgs_version="$(nix eval --raw "github:NixOS/nixpkgs/nixpkgs-unstable#${nix_attr}.version")"
          echo "live_nixpkgs_version=$live_nixpkgs_version" >> "$GITHUB_OUTPUT"
          if version_ge "$live_nixpkgs_version" "$target_go_version"; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
            echo "no_pr_reason=Live nixpkgs-unstable already provides ${nix_attr} ${live_nixpkgs_version}, which satisfies ${target_go_version}." >> "$GITHUB_OUTPUT"
            echo "nixpkgs-unstable has caught up; no PR created."
            exit 0
          fi

          if version_ge "$override_go" "$target_go_version"; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
            echo "no_pr_reason=The pinned Go override ${override_go} already satisfies fixed version ${target_go_version}." >> "$GITHUB_OUTPUT"
            echo "Pinned Go override already satisfies the fixed version; no PR created."
            exit 0
          fi

          echo "update_needed=true" >> "$GITHUB_OUTPUT"
          echo "Break-glass update needed: override=$override_go target=$target_go_version live_nixpkgs=$live_nixpkgs_version."

      - name: Update Go toolchain override
        id: update
        if: steps.assess.outputs.update_needed == 'true'
        env:
          TARGET_GO_VERSION: ${{ steps.assess.outputs.target_go_version }}
        run: |
          set -euo pipefail

          version_ge() {
            local first="$1"
            local second="$2"
            [[ "$(printf '%s\n%s\n' "$second" "$first" | sort -V | tail -n 1)" == "$first" ]]
          }

          nix run .#update-go-toolchain
          nix develop .#ci --command go mod tidy

          changed_files="$(git diff --name-only)"
          if [[ -z "$changed_files" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no_pr_reason=The updater produced no repository diff." >> "$GITHUB_OUTPUT"
            echo "No repository diff after updater; no PR created."
            exit 0
          fi

          unexpected_files="$(printf '%s\n' "$changed_files" | grep -Ev '^flake\.nix$' || true)"
          if [[ -n "$unexpected_files" ]]; then
            echo "Unexpected files changed by Go toolchain update:" >&2
            printf '%s\n' "$unexpected_files" >&2
            exit 1
          fi

          go_version="$(
            perl -0ne 'print "$1\n" if /pkgs\.go_[0-9]+_[0-9]+\.overrideAttrs \(_old: rec \{\n\s*version = "([0-9]+\.[0-9]+\.[0-9]+)";/' flake.nix
          )"
          test -n "$go_version" || { echo "Failed to extract updated Go override version" >&2; exit 1; }
          if ! version_ge "$go_version" "$TARGET_GO_VERSION"; then
            echo "Updated Go override $go_version does not satisfy fixed version $TARGET_GO_VERSION" >&2
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "go_version=$go_version" >> "$GITHUB_OUTPUT"

      - name: Verify update
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail
          nix develop .#ci --command govulncheck ./...
          nix develop .#ci --command govulncheck -scan=module
          nix flake check --print-build-logs
          nix build --print-build-logs

      - name: Source build attestation
        if: steps.update.outputs.changed == 'true' && inputs.source_attestation
        run: |
          set -euo pipefail
          nix build --option substitute false --print-build-logs

      - name: Report no PR reason
        if: steps.assess.outputs.update_needed != 'true' || steps.update.outputs.changed == 'false'
        env:
          ASSESS_REASON: ${{ steps.assess.outputs.no_pr_reason }}
          UPDATE_REASON: ${{ steps.update.outputs.no_pr_reason }}
        run: |
          set -euo pipefail
          reason="$ASSESS_REASON"
          if [[ -z "$reason" ]]; then
            reason="$UPDATE_REASON"
          fi
          echo "$reason"

      - name: Create update pull request
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GO_VERSION: ${{ steps.update.outputs.go_version }}
          GO_MINOR: ${{ steps.assess.outputs.go_minor }}
          NIX_ATTR: ${{ steps.assess.outputs.nix_attr }}
          CURRENT_GO_VERSION: ${{ steps.assess.outputs.current_go_version }}
          TARGET_GO_VERSION: ${{ steps.assess.outputs.target_go_version }}
          UPSTREAM_GO_RELEASE: ${{ steps.assess.outputs.upstream_go_release }}
          LIVE_NIXPKGS_VERSION: ${{ steps.assess.outputs.live_nixpkgs_version }}
          GO_TOOLCHAIN_FINDINGS: ${{ steps.assess.outputs.go_toolchain_findings }}
          SOURCE_ATTESTATION: ${{ inputs.source_attestation }}
        run: |
          set -euo pipefail
          branch="chore/update-go-toolchain-breakglass"
          title="chore(security): update Go toolchain to ${GO_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git switch -c "$branch"
          git add flake.nix
          git commit -m "$title"
          git fetch origin main
          base_ref="origin/main"
          base_sha="$(git rev-parse "$base_ref")"
          merge_base="$(git merge-base "$base_ref" HEAD)"
          if [[ "$merge_base" != "$base_sha" ]]; then
            echo "Updater branch is not based on current origin/main" >&2
            echo "origin/main: $base_sha" >&2
            echo "merge-base:  $merge_base" >&2
            exit 1
          fi
          pr_files="$(git diff --name-only "$base_ref"...HEAD)"
          unexpected_pr_files="$(printf '%s\n' "$pr_files" | grep -Ev '^flake\.nix$' || true)"
          if [[ "$pr_files" != "flake.nix" || -n "$unexpected_pr_files" ]]; then
            echo "Unexpected PR diff relative to origin/main:" >&2
            printf '%s\n' "$pr_files" >&2
            exit 1
          fi
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git push --force-with-lease origin "HEAD:$branch"

          attestation_line="- No-substitute source build: not run by default; dispatch with source_attestation=true for explicit attestation."
          if [[ "$SOURCE_ATTESTATION" == "true" ]]; then
            attestation_line="- \`nix build --option substitute false --print-build-logs\`"
          fi

          body="$(mktemp)"
          cat > "$body" <<EOF
          Updates the pinned Go toolchain override from ${CURRENT_GO_VERSION} to ${GO_VERSION}.

          Break-glass evidence:

          - \`govulncheck -json -scan=module\` found stdlib/toolchain module findings for Go ${GO_MINOR}.
          - Upstream Go release satisfies the fixed version: \`${UPSTREAM_GO_RELEASE}\`.
          - Live \`nixpkgs-unstable\` \`${NIX_ATTR}\` is \`${LIVE_NIXPKGS_VERSION}\`, which still lags fixed version \`${TARGET_GO_VERSION}\`.
          - The PR diff from \`origin/main\` contains only \`flake.nix\`.

          Findings:

          \`\`\`text
          ${GO_TOOLCHAIN_FINDINGS}
          \`\`\`

          Verification run by this workflow:

          - \`go mod tidy\`
          - \`govulncheck ./...\`
          - \`govulncheck -scan=module\`
          - \`nix flake check --print-build-logs\`
          - \`nix build --print-build-logs\`
          ${attestation_line}
          EOF

          if gh pr view "$branch" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$branch" --repo "$GITHUB_REPOSITORY" --title "$title" --body-file "$body"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$branch" \
              --title "$title" \
              --body-file "$body"
          fi
