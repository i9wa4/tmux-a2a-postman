name: ci
run-name: ${{ github.event_name }} on ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            timeout_minutes: 15
          - os: macos-latest
            timeout_minutes: 15
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check Go toolchain alignment
        run: |
          set -euo pipefail
          mod_go="$(awk '/^go / { print $2; exit }' go.mod | cut -d. -f1-2)"
          nix_go="$(
            sed -nE 's/.*pkgs\.go_([0-9]+_[0-9]+).*/\1/p' flake.nix \
              | head -n 1 \
              | tr '_' '.'
          )"
          override_go="$(
            perl -0ne 'print "$1\n" if /go126 = pkgs\.go_1_26\.overrideAttrs \(_old: rec \{\n\s*version = "([0-9]+\.[0-9]+\.[0-9]+)";/' flake.nix
          )"
          echo "go.mod: $mod_go"
          echo "flake.nix: $nix_go"
          echo "Go override: $override_go"
          test -n "$mod_go" || { echo "Failed to extract Go version from go.mod" >&2; exit 1; }
          test -n "$nix_go" || { echo "Failed to extract Go version from flake.nix" >&2; exit 1; }
          test -n "$override_go" || { echo "Failed to extract Go override patch version from flake.nix" >&2; exit 1; }
          if [[ "$mod_go" != "$nix_go" ]]; then
            echo "Go major.minor mismatch: go.mod=$mod_go, flake.nix=$nix_go" >&2
            exit 1
          fi
          if [[ "$override_go" != "$mod_go".* ]]; then
            echo "Go override mismatch: go.mod=$mod_go, override=$override_go" >&2
            exit 1
          fi

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          github_access_token: ${{ github.token }}
          extra_nix_config: |
            accept-flake-config = true

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', 'flake.lock') }}

      - name: Run nix flake check
        run: nix flake check --print-build-logs

      - name: Run nix build
        run: nix build --print-build-logs

      - name: Run Go linters
        run: nix develop .#ci --command golangci-lint run ./...

      - name: Validate agent skills
        env:
          GH_TOKEN: ${{ github.token }}
        run: nix run '.#skill-check'

      - name: Run gitleaks history scan
        run: nix develop .#ci --command gitleaks detect --verbose --redact

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          github_access_token: ${{ github.token }}
          extra_nix_config: |
            accept-flake-config = true

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', 'flake.lock') }}

      - name: Run govulncheck
        run: nix develop .#ci --command govulncheck ./...

  security-report:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          github_access_token: ${{ github.token }}
          extra_nix_config: |
            accept-flake-config = true

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', 'flake.lock') }}

      - name: Generate govulncheck SARIF
        id: govulncheck-sarif
        continue-on-error: true
        run: nix develop .#ci --command govulncheck -format=sarif ./... > govulncheck.sarif

      - name: Upload govulncheck SARIF
        if: steps.govulncheck-sarif.outcome == 'success'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: govulncheck.sarif

  ci:
    needs: [check, security]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"
            exit 1
          fi
          echo "All checks passed"
