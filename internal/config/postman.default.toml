# Postman Configuration
# File-based communication daemon for tmux panes

# =============================================================================
# Template Variables Reference
# =============================================================================
#
# notification_template:
#   {from_node}        - Sender node name
#   {node}             - Recipient node name
#   {timestamp}        - Current time (YYYYMMDD-HHMMSS, when notification is built)
#   {sent_timestamp}   - Sent time extracted from message filename (YYYYMMDD-HHMMSS; "" if unavailable)
#   {inbox_path}       - Full path to recipient's inbox directory
#   {filename}         - Message filename
#   {talks_to_line}    - Formatted list of nodes this node can communicate with
#   {template}         - Node's role template (from [node].template)
#   {reply_command}    - Command to create draft message
#   {context_id}       - Current context ID
#   {session_dir}      - Session directory path
#   {session_name}     - tmux session name of the sender
#
#
# draft_template:
#   {context_id}     - Current context ID
#   {sender}         - Sender node name
#   {recipient}      - Recipient node name
#   {timestamp}      - ISO format timestamp
#   {can_talk_to}    - Formatted list of nodes this sender can communicate with
#   {contacts_section} - Markdown bullet list of reachable nodes with concise role summaries
#   {session_dir}    - Session directory path
#   {reply_command}  - Command to create draft reply
#   {message_id}     - Current message id
#   {reply_policy}   - Resolved reply policy
#   {reply_to}       - Message id this message references, when supplied
#   {input_request_id}  - Exact input request id for reply-required messages
#   {fills_input_request_id} - Exact input request id this message fills
#   {sender_runtime_context} - Optional compatibility sender runtime context block
#   {runtime_context_id} - Runtime context snapshot id
#   {runtime_context_scope} - Runtime context scope, usually sender
#   {runtime_context_captured_at} - Runtime context capture timestamp
#   {runtime_context_hash} - Runtime context snapshot content hash
#   {template}       - Recipient's role template from config
#   {sender_pane_id} - tmux pane ID of the sender (e.g. %42)
#
# common_template:
#   Shared template string prepended to all node templates.
#   Applied in notification context. Not applied to draft.
#
# edge_violation_warning_template (DM-1 normalized full envelope):
#   {context_id}          - Current context ID
#   {node}                - Recipient node name (sender of the denied message)
#   {iso_timestamp}       - ISO format timestamp
#   {timestamp}           - ISO format timestamp (alias)
#   {attempted_recipient} - Node name that the sender attempted to send to
#   {allowed_edges}       - Comma-separated list of allowed neighbors
#   {reply_command}       - Command to create draft message
#   {session_dir}         - Session directory path
#   {filename}            - Warning message filename
#
# =============================================================================

[postman]
# Timing settings
scan_interval_seconds = 1.0          # Pane rescan interval
session_scan_interval_seconds = 0.10 # Lightweight tmux session-list rescan interval
tmux_timeout_seconds = 30.0          # Timeout for tmux commands
enter_delay_seconds = 3.0            # Delay before sending Enter key
enter_verify_delay_seconds = 3.0     # Delay for post-Enter capture comparison (0 = disabled)
enter_retry_max = 2                  # Max C-m retries on unchanged pane capture (0 = disabled)
auto_ping_delay_seconds = 20.0       # Delay before first auto-PING for newly appeared/replacement nodes
message_ttl_seconds = 600              # Stale post/ drain TTL in seconds (0 = disabled)
retention_period_days = 30            # Inactive runtime cleanup threshold in days (0 = disabled)
min_delivery_gap_seconds = 1.0         # Duplicate delivery rate limit in seconds (0 = disabled)
startup_drain_window_seconds = 10.0    # Session-enabled bypass window after daemon start (0 = disabled)
daemon_submit_worker_limit = 8         # Daemon-submit worker concurrency (1-16; values above 16 are clamped)

# Node state thresholds
node_active_seconds = 300          # <=5min since last pane change: internal active
node_stale_seconds = 900           # Memory cleanup threshold for pane capture state
input_request_stale_seconds = 3600 # Status projection threshold for stale unfilled input requests
verdict_grace_seconds = 3600       # Grace period for requester verdict stamps after filled reply-required input requests
verdict_debt_cap = 3               # Maximum unstamped fills before new reply-required sends are refused
daemon_submit_queue_warn_threshold_ms = 30000  # Queue wait WARNING threshold in ms (0 = use default 30 000)

# Pane capture settings (hybrid idle detection)
pane_capture_enabled = true
pane_capture_interval_seconds = 5.0
pane_capture_max_panes = 0          # 0 = unlimited, >0 = limit pane count
pane_capture_tail_lines = 100        # Recent-line compaction scan; Claude/Codex first/change captures may fall back to full retained history (0 = visible pane only)
activity_window_seconds = 300.0

# Paths
base_dir = ""                      # Override session dir (default: XDG_STATE_HOME/tmux-a2a-postman)

# Routing edges (bidirectional)
# Format: "node-a --- node-b"
# Example multi-hop: "node-a --- node-b --- node-c" creates edges A↔B, B↔C
# edges = [
#   "node-a --- node-b",
#   "node-b --- node-c",
# ]
edges = []

# Optional workspace tree hierarchy for cross-session tree aliases.
# Hierarchy is captured from explicit session metadata at daemon/CLI load time;
# pane cwd changes do not affect routing eligibility. There is no directory-root
# inference — parent/child relationships are always explicit config entries.
# Public status reports labels and stable IDs only.
# Alias syntax:
#   @parent                              # parent representative
#   @parent/<node>
#   @child/<label-or-session-or-id>       # selected child representative
#   @child/<node>                         # only when there is one configured child
#   @child/<label-or-session-or-id>/<node>
#
# [[postman.workspace_tree]]
# session = "repo"
# label = "repo"
# id = "repo-root"
# representative = "orchestrator"
# order = 10
#
# [[postman.workspace_tree]]
# session = "project"
# label = "api"
# parent = "repo"
# representative = "worker"
# order = 20

# Global settings
reply_command = "tmux-a2a-postman send-heredoc --to <recipient>"
ui_node = "messenger"            # Optional target filter for startup auto-PING
auto_enable_new_sessions = true    # Required default: auto-claim configured nodes in other tmux sessions so startup/discovery auto-PING reaches them
# startup_guard_enabled = false    # TUI startup guard toggle; ALWAYS starts false at code level
#                                  # regardless of this value (Issue #249). Press 'S' in TUI to arm.
# Configure the execute-bash command approver in postman.md by marking exactly
# one node in the Mermaid edges graph with:
#   class orchestrator command_approver_node
# Unset, or set to a node that doesn't resolve, means every command approval
# mode fails open (runs, audited as auto_approved_no_reviewer) — including
# blocking. The approver is global; per-policy approver routing is unsupported.

# Command approval policies for execute-bash (Issue #484/#625/#626/#629). Optional; no policies means every
# execute-bash invocation uses the advisory default.
# [[postman.command_approval]]
# requester = "worker"
# label = "nix-build"
# category = "verification"
# reviewer = "orchestrator"
# mode = "blocking"
# approval_ttl_seconds = 900

# Common template (prepended to all node templates)
common_template = ""

# Shell templates are disabled unless explicitly enabled in trusted XDG config.
allow_shell_templates = false

# Notification template (when new message arrives)
notification_template = """Hello, {node}! You've got mail: {filename}. Run `tmux-a2a-postman pop` to claim it and get the archived body path. """

# Message footer (rendered into the generated header before the sender body separator)
# Variables: {can_talk_to} - comma-separated list of reachable nodes
#            {contacts_section} - Markdown bullet list of reachable nodes with concise role summaries
#            {reply_command} - reply command for the current recipient
#            {message_id} - current message id, usable with --reply-to
#            {reply_arguments} - exact reply args for required mail, reply-to args otherwise
#            {input_request_id} - exact input request id when reply is required
#            {fills_input_request_id} - exact input request id this message fills
#            {required_reply_completion_gate} - completion proof guidance for reply-required messages; empty otherwise
message_footer = """You can talk to:
{contacts_section}
Reply with quoted heredoc:
{reply_command}{reply_arguments} <<'POSTMAN_BODY'
<your message>
POSTMAN_BODY
{required_reply_completion_gate}Add --reply-required only when your reply needs a response.
No reply needed for: DONE, ACK, PING, HEARTBEAT_OK, status updates, alerts, or pane hints."""

# Daemon message template (shared envelope for daemon-originated PING)
# Pass 1 variables (BuildEnvelope): {context_id}, {from_node}, {node},
#   {iso_timestamp}, {talks_to_line}, {contacts_section}, {reply_command},
#   {session_name}, {session_dir}
# Pass 2 variables (caller-injected): {message_type}, {heading}, {message},
#   {role_content}
# For daemon PINGs, {role_content} may include catalogs generated from
# postman.md skill_path entries with inject: ping, inject: compaction_ping, or
# a list containing those modes.
daemon_message_template = """---
params:
  contextId: {context_id}
  from: {from_node}
  to: {node}
  messageId: {filename}
  replyPolicy: none
  timestamp: {iso_timestamp}
  messageType: {message_type}
  tmuxSession: {session_name}
---

# {heading}

How to reply with quoted heredoc:
{reply_command} <<'POSTMAN_BODY'
<your message>
POSTMAN_BODY

You can talk to:
{contacts_section}

## Recipient Instructions

{role_content}

## Daemon Message

{message}
"""

# Draft message template (user-initiated messages via send-heredoc)
# Variables: {context_id}, {sender}, {recipient}, {timestamp},
#   {session_name}, {template}, {can_talk_to}, {contacts_section}, {reply_command},
#   {message_id}, {reply_policy}, {reply_to}, {input_request_id},
#   {fills_input_request_id}, {sender_runtime_context}, {runtime_context_id},
#   {runtime_context_scope}, {runtime_context_captured_at}, {runtime_context_hash}
# The <!-- write here --> placeholder is replaced with sender-authored Markdown
# exactly after a visible --- separator. Generated footer guidance is kept
# before that separator. ATX headings in {template} and {role_content} are
# normalized when inserted so generated instructions remain inside the
# surrounding envelope section; sender-authored Markdown is not rewritten.
draft_template = """---
params:
  contextId: {context_id}
  from: {sender}
  to: {recipient}
  messageId: {message_id}
  replyPolicy: {reply_policy}
  timestamp: {timestamp}
  tmuxSession: {session_name}
  runtimeContextId: {runtime_context_id}
  runtimeContextScope: {runtime_context_scope}
  runtimeContextCapturedAt: {runtime_context_captured_at}
  runtimeContextHash: {runtime_context_hash}
---

# Message

## Recipient Instructions

{template}

## Sender Message

---

<!-- write here -->
"""

# Edge violation warning template (Issue #92, DM-1 normalized #222)
# Full envelope template with messageType discriminator in frontmatter.
# Variables: {context_id}, {node}, {iso_timestamp}, {attempted_recipient},
#            {allowed_edges}, {reply_command}, {session_dir}, {filename}
edge_violation_warning_mode = "compact"  # "compact" or "verbose" (default: compact)
edge_violation_warning_template = """---
params:
  contextId: {context_id}
  from: postman
  to: {node}
  timestamp: {iso_timestamp}
  messageType: edge_violation_warning
---

## Edge Violation Warning

you can't talk to "{attempted_recipient}". Can talk to: {allowed_edges}. Your message has been moved to dead-letter/.
"""

# =============================================================================
# Node-Specific Configuration
# =============================================================================
#
# Example node configuration:
#
# [example-node]
# role = "coordination, delegation"
# template = """
# # EXAMPLE-NODE
#
# - Node role and responsibilities
# - Instructions and constraints
# """
[node_defaults]
enter_count = 2            # Codex CLI needs 2 Enters; auto-falls back to 1 for non-codex runtimes
enter_delay_seconds = 0    # 0 = use global enter_delay_seconds
