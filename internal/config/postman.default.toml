# Postman Configuration
# File-based communication daemon for tmux panes

# =============================================================================
# Template Variables Reference
# =============================================================================
#
# notification_template:
#   {from_node}      - Sender node name
#   {node}           - Recipient node name
#   {timestamp}      - Message timestamp (YYYYMMDD-HHMMSS)
#   {inbox_path}     - Full path to recipient's inbox directory
#   {filename}       - Message filename
#   {talks_to_line}  - Formatted list of nodes this node can communicate with
#   {template}       - Node's role template (from [node].template)
#   {reply_command}  - Command to create draft message
#   {context_id}     - Current context ID
#   {session_dir}    - Session directory path
#   {session_name}   - tmux session name of the sender
#
#
# draft_template:
#   {context_id}     - Current context ID
#   {task_id}        - Unique task identifier
#   {sender}         - Sender node name
#   {recipient}      - Recipient node name
#   {timestamp}      - ISO format timestamp
#   {from}           - Alias for {sender} (backward compatibility)
#   {to}             - Alias for {recipient} (backward compatibility)
#   {can_talk_to}    - Formatted list of nodes this sender can communicate with
#   {session_dir}    - Session directory path
#   {templates_dir}  - Path to templates directory (context-level, not session-level)
#   {reply_command}  - Command to create draft reply with context_id substituted
#   {template}       - Recipient's role template from config
#
# common_template:
#   Shared template string prepended to all node templates.
#   Applied in notification context. Not applied to draft.
#
# edge_violation_warning_template (DM-1 normalized full envelope):
#   {context_id}          - Current context ID
#   {node}                - Recipient node name (sender of the denied message)
#   {iso_timestamp}       - ISO format timestamp
#   {timestamp}           - ISO format timestamp (alias)
#   {attempted_recipient} - Node name that the sender attempted to send to
#   {allowed_edges}       - Comma-separated list of allowed neighbors
#   {reply_command}       - Command to create draft message
#   {session_dir}         - Session directory path
#   {filename}            - Warning message filename
#
# =============================================================================

[postman]
# A2A protocol version
a2a_version = "1.0"

# Timing settings
scan_interval_seconds = 1.0        # Pane rescan interval
tmux_timeout_seconds = 30.0        # Timeout for tmux commands
enter_delay_seconds = 3.0          # Delay before sending Enter key
startup_delay_seconds = 10.0       # Initial startup delay
reminder_interval_messages = 20    # Send reminder after N messages (0 = disabled)
inbox_unread_threshold = 2         # Alert ui_node when inbox has N+ unread messages (0 = disabled)
# message_ttl_seconds = 600       # Stale post/ drain TTL in seconds (0 = disabled)
# min_delivery_gap_seconds = 1.0  # Duplicate delivery rate limit in seconds (0 = disabled)
# startup_drain_window_seconds = 10.0  # Session-enabled bypass window after daemon start (0 = disabled)

# TUI settings
edge_activity_seconds = 60.0       # TUI edge glow duration (1-3600)

# Node state thresholds
node_active_seconds = 300          # 0-5min: active (green)
node_idle_seconds = 900            # 5-15min: idle (orange), 15min+: stale (red)
node_stale_seconds = 900           # Memory cleanup threshold for pane capture state
node_spinning_seconds = 0          # disabled by default; set to positive seconds to enable spinning detection

# Pane capture settings (hybrid idle detection)
pane_capture_enabled = true
pane_capture_interval_seconds = 10.0
pane_capture_max_panes = 0          # 0 = unlimited, >0 = limit pane count
activity_window_seconds = 300.0

# Paths
# base_dir = ""                    # Override session dir (default: XDG_STATE_HOME/tmux-a2a-postman)

# Routing edges (bidirectional)
# Format: "node-a -- node-b" or "node-a --> node-b"
# Example multi-hop: "node-a -- node-b -- node-c" creates edges A↔B, B↔C
# edges = [
#   "node-a -- node-b",
#   "node-b -- node-c",
# ]
edges = []

# Global settings
# reply_command = "tmux-a2a-postman create-draft --context-id {context_id} --to <recipient>"
# ui_node = "messenger"            # TUI target node for daemon alerts
# diplomat_node = ""               # Cross-context (cross-daemon) node name; empty = disabled (Issue #164)
# diplomat_allowlist = []          # Accepted source diplomat_node names; empty = allow all (Issue #165)

# reminder_message:
#   {node}      - Node name
#   {count}     - Message count since last reminder
#   {template}  - Node's role template (inline content, or "Role template: <path>" for
#                 materialized nodes — agent must read the file for full content)
#   {inbox_path} - Full path to recipient's inbox directory
#
# NOTE: if reminder_message = "{template}" and a node has no template defined,
#       {template} expands to "" and SendToPane is called with empty content (spurious Enter).
#       Ensure all nodes have a template when using this pattern.
#
reminder_message = "{inbox_path}"

# Alert action templates (appended to daemon alert messages sent to ui_node)
# Variables: {node} - target node name, {reply_command} - command to create draft
alert_action_reachable_template = "\n\n### Action Required\nTo send a message to {node}, run:\n\n  {reply_command}\n"
alert_action_unreachable_template = "\n\n### Action Required\nNote: {node} is not in your allowed contacts list.\nAsk your orchestrator to follow up.\n"

# Alert message body templates (used as alert content sent to ui_node)
inbox_stagnation_alert_template = "Inbox stagnation [{severity}]: {node} has unread message in inbox for {age} (threshold: {threshold})"
inbox_unread_summary_alert_template = "Inbox unread summary: {node} has {count} unread messages (threshold: {threshold})"
node_inactivity_alert_template = "Node inactivity [{severity}]: {node} inactive for {inactive_duration} (threshold: {threshold}). Last sent: {last_sent}, Last received: {last_received}, PONG received: {pong_received}"
unreplied_message_alert_template = "Unreplied message [WARNING]: {node} has message in read/ for {time_since_read} without reply (from: {from}, threshold: {threshold})"
spinning_alert_template = "[SPINNING] {node} has been composing for {spinning_duration} (threshold: {threshold}). Pane is active — possible infinite loop or runaway computation."

# Common template (prepended to all node templates)
# common_template = ""

# Notification template (when new message arrives)
notification_template = """{inbox_path}/{filename}
Role: {template_path} | Protocol: {session_dir}/RULES.md
After reading: tmux-a2a-postman archive {filename}"""

# Envelope template for daemon-initiated A2A inbox files (replaces ping_template).
# Used by: ping (SendPingToNode). NOT used by pane notification hints (see notification_template).
# Pass 2 injects {role_content} after BuildEnvelope.
message_template = """---
method: message/send
params:
  contextId: {context_id}
  taskId: {task_id}
  from: {from_node}
  to: {node}
  timestamp: {iso_timestamp}
  messageType: ping
  tmuxSession: {session_name}
---

# tmux-a2a-postman

## Role of {node}

```
{role_content}
```

## Contacts

{contacts_section}

How to reply: {reply_command}

## Ping

This message is from the postman daemon. Do NOT reply to postman.
Resume your work or reply to your orchestrator if you need to communicate.

{talks_to_line}

After reading: tmux-a2a-postman archive {filename}
"""

# Draft message template
draft_template = """---
method: message/send
params:
  contextId: {context_id}
  taskId: {task_id}
  from: {sender}
  to: {recipient}
  timestamp: {timestamp}
  tmuxSession: {session_name}
role: {templates_dir}/{recipient}.md
protocol: {session_dir}/RULES.md
---

## Recipient Role (context only):

{template}

---

You can only talk to: {can_talk_to}

How to reply: {reply_command}

# Content

After reading: tmux-a2a-postman archive <this-filename>  (replace with actual filename)
"""

# Alert message template (unified format for daemon alerts)
# Variables: {context_id}, {task_id}, {from_node}, {node}, {iso_timestamp}, {alert_type},
#            {contacts_section}, {reply_command}, {session_dir}, {filename},
#            {role_content} (Pass 2), {message} (Pass 2)
alert_message_template = """---
method: message/send
params:
  contextId: {context_id}
  taskId: {task_id}
  from: {from_node}
  to: {node}
  timestamp: {iso_timestamp}
  alertType: {alert_type}
  messageType: alert
  tmuxSession: {session_name}
---

# tmux-a2a-postman

## Role of {node}

```
{role_content}
```

## Contacts

{contacts_section}

How to reply: {reply_command}

## Alert: {alert_type}

{message}

After reading: tmux-a2a-postman archive {filename}
"""

# Heartbeat message template (unified format for heartbeat-LLM triggers)
# Variables: {context_id}, {task_id}, {from_node}, {node}, {iso_timestamp},
#            {contacts_section}, {reply_command}, {session_dir}, {filename},
#            {role_content} (Pass 2), {message} (Pass 2; = expanded heartbeat prompt)
heartbeat_message_template = """---
method: message/send
params:
  contextId: {context_id}
  taskId: {task_id}
  from: {from_node}
  to: {node}
  timestamp: {iso_timestamp}
  messageType: heartbeat
  tmuxSession: {session_name}
---

# tmux-a2a-postman

## Role of {node}

```
{role_content}
```

## Contacts

{contacts_section}

How to reply: {reply_command}

## Heartbeat

{message}

After reading: tmux-a2a-postman archive {filename}
"""

# Idle reminder message template (unified format; written to post/ for daemon-routed delivery)
# Variables: {context_id}, {task_id}, {from_node}, {node}, {iso_timestamp}, {alert_type},
#            {contacts_section}, {reply_command}, {session_dir}, {filename},
#            {role_content} (Pass 2), {message} (Pass 2; = node's IdleReminderMessage)
idle_reminder_message_template = """---
method: message/send
params:
  contextId: {context_id}
  taskId: {task_id}
  from: {from_node}
  to: {node}
  timestamp: {iso_timestamp}
  alertType: idle_reminder
  tmuxSession: {session_name}
---

# tmux-a2a-postman

## Role of {node}

```
{role_content}
```

## Contacts

{contacts_section}

How to reply: {reply_command}

## Alert: idle_reminder

{message}

After reading: tmux-a2a-postman archive {filename}
"""

# Edge violation warning template (Issue #92, DM-1 normalized #222)
# Full envelope template with messageType discriminator in frontmatter.
# Variables: {context_id}, {node}, {iso_timestamp}, {attempted_recipient},
#            {allowed_edges}, {reply_command}, {session_dir}, {filename}
# edge_violation_warning_mode = "compact"  # "compact" or "verbose" (default: compact)
# edge_violation_warning_template = """---
# method: message/send
# params:
#   contextId: {context_id}
#   from: postman
#   to: {node}
#   timestamp: {iso_timestamp}
#   messageType: edge_violation_warning
# ---
#
# ## Edge Violation Warning
#
# you can't talk to "{attempted_recipient}". Can talk to: {allowed_edges}. Your message has been moved to dead-letter/.
# """

# Rules template (generated as RULES.md in session directory)
rules_template = """
## Messaging Protocol

### Message Format

All messages use YAML frontmatter followed by content:

    ---
    method: message/send
    params:
      contextId: <context ID>
      taskId: <unique task ID>
      from: <sender node>
      to: <recipient node>
      timestamp: <ISO timestamp>
    ---

    You can only talk to: <comma-separated list>

    # Content

    <message body>

    ## Reply

    Protocol reference: {session_dir}/RULES.md

### Sending Messages

1. Create draft: {reply_command}
   Replace `<recipient>` with target node name
2. Edit the draft content in {session_dir}/draft/
3. Send: tmux-a2a-postman send <file>

### Receiving Messages

- Notification arrives in your pane as a file path
- Notification is wrapped in `<!-- message start -->` / `<!-- end of message -->` (pane protocol only)
- Read the file at the given path
- After reading: tmux-a2a-postman archive <filename>

### Waiting State

After moving a message to read/, a waiting file is automatically created:
  {session_dir}/waiting/<same-filename-as-read-message>

File content includes a `state` field:
- composing   agent received a message and is preparing a reply
- user_input  agent is waiting for user input (ui_node, never stuck)
- stuck       daemon detected pane went stale while composing
- spinning    daemon detected pane active but no reply after node_spinning_seconds

The file is automatically removed when you send a reply (tmux-a2a-postman send <file>).

Monitoring:
  # Agents stuck (pane went stale while composing):
  grep -rl "state: stuck" {session_dir}/waiting/

  # Agents actively composing:
  grep -rl "state: composing" {session_dir}/waiting/

  # Agents spinning (active pane, no reply — possible infinite loop):
  grep -rl "state: spinning" {session_dir}/waiting/

  # User input waits (expected, not stuck — always ignore):
  grep -rl "state: user_input" {session_dir}/waiting/

### Session Validation

Before processing a message, verify `params.tmuxSession` matches your own session.
If it does not match, move the file to `{session_dir}/mismatch/<your-node>/`.

### Standard Replies

- HEARTBEAT_OK: see {session_dir}/boilerplate/heartbeat_ok.md
- [status] - current task, blockers, next action
- [error] - description, mitigation, next step
"""

# Boilerplate response files (auto-generated per session in {session_dir}/boilerplate/)
# boilerplate_heartbeat_ok = "HEARTBEAT_OK"
# boilerplate_how_to_reply = """
# 1. {reply_command}
#    Replace `<recipient>` with target node name
# 2. Edit the draft content
# 3. Send: tmux-a2a-postman send <file>
# """

# Idle reminder header template (Issue #82)
# idle_reminder_header_template = "## Idle Reminder"

# Compaction detection header template (Issue #82)
# compaction_header_template = "## Compaction Detected"

# Compaction notification body template (Issue #82)
# Variables: {node}
# compaction_body_template = "Compaction detected for node {node}. Please send status update."

# Dropped ball event message template (Issue #82)
# Variables: {node}, {duration}
# dropped_ball_event_template = "Dropped ball: {node} (holding for {duration})"

# =============================================================================
# Node-Specific Configuration
# =============================================================================
#
# Example node configuration:
#
# [example-node]
# role = "coordination, delegation"
# on_join = "Welcome message sent when node joins"
# template = """
# # EXAMPLE-NODE
#
# - Node role and responsibilities
# - Instructions and constraints
# """
# materialize_template = false       # Write template as state file; reference by labeled path (no @ prefix).
#                                    # NOTE: Takes effect only at daemon startup. Restart daemon after enabling.
# reminder_interval_messages = 0     # Node-specific reminder interval (overrides global)
# reminder_message = ""              # Node-specific reminder message
# idle_timeout_seconds = 0.0         # Idle timeout (0 = disabled)
# idle_reminder_message = ""         # Idle reminder message
# idle_reminder_cooldown_seconds = 0.0
# dropped_ball_timeout_seconds = 0   # Dropped ball detection (0 = disabled)
# dropped_ball_cooldown_seconds = 0  # Dropped ball cooldown (default: same as timeout)
# dropped_ball_notification = "tui"  # "tui" (default) / "display" / "all"

# =============================================================================
# Heartbeat-LLM Configuration
# =============================================================================

[heartbeat]
enabled = false
interval_seconds = 1800.0
llm_node = ""
prompt = """Read HEARTBEAT.md if it exists. Follow it strictly. Do not infer tasks from prior history.

If nothing needs attention:
  nix run github:i9wa4/tmux-a2a-postman -- create-draft \\
    --context-id {context_id} --to postman
  Set Content to: HEARTBEAT_OK
  Run: tmux-a2a-postman send <filename>

If action is needed: reply to messenger with [HEARTBEAT ALERT] prefix:
  nix run github:i9wa4/tmux-a2a-postman -- create-draft \\
    --context-id {context_id} --to messenger
  Set Content to: [HEARTBEAT ALERT] <your message>
  Run: tmux-a2a-postman send <filename>"""

[node_defaults]
enter_count = 2            # Codex CLI needs 2 Enters; auto-falls back to 1 for non-codex runtimes
materialize_template = true  # Write role templates to files; reference by path in notifications
